<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coredex - Premium Scanner</title>
    <style>
        /* איפוס והגדרת פונט נקי, נעילת המסך למניעת זום או גלילה */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7; 
            color: #1d1d1f; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* לוקח בדיוק 100% מגובה המסך */
            overflow: hidden; /* מבטל את אפשרות הגלילה לגמרי! */
        }

        .header {
            text-align: center;
            padding: 2vh 20px 1vh;
            height: 10vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }
        #status { 
            font-size: 15px; 
            font-weight: 500; 
            color: #86868b; 
            transition: color 0.3s ease;
        }
        
        /* התיבה עכשיו מבוססת גובה, ומתאימה את הרוחב אוטומטית לפי המצלמה! */
        .container { 
            position: relative; 
            height: 75vh; /* התיבה תתפוס תמיד 75% מהמסך - מבטל את הצורך בזום-אווט */
            width: auto; /* הרוחב יחושב אוטומטית לפי היחס */
            background: #000; 
            border-radius: 24px; 
            box-shadow: 0 24px 48px rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.06);
            overflow: hidden; 
            margin-bottom: 2vh;
            /* ה-aspect-ratio מוזרק דינמית מה-JavaScript למניעת שטחים מתים */
        }
        
        video, canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }
        video { display: none; }
        
        .mode-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1d1d1f;
            padding: 16px 40px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 10;
        }
        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateX(-50%) scale(1.03);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }
        .mode-btn:active { transform: translateX(-50%) scale(0.97); }
        
        .mode-btn.active-electrodes { 
            background: rgba(52, 199, 89, 0.85);
            color: white; 
            border-color: rgba(52, 199, 89, 0.5);
        }
        .mode-btn.active-electrodes:hover { background: rgba(52, 199, 89, 1); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Coredex</h1>
        <div id="status">מאתחל חיישנים חכמים...</div>
    </div>
    
    <div class="container" id="videoContainer">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
        <button id="toggleBtn" class="mode-btn active-skeleton" onclick="toggleMode()">שלד אנטומי</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const container = document.getElementById('videoContainer');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const toggleBtn = document.getElementById('toggleBtn');
        
        const worker = new Worker('worker.js');
        let isWorkerBusy = false;
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 416; 
        tempCanvas.height = 416;
        const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        
        let smoothedKpts = new Array(23).fill(null);
        let targetKpts = new Array(16).fill(null);
        const smoothingFactor = 0.35; 
        let electrodeMode = false;

        const connections = {
            turquoise: { pairs: [[0, 1]], color: 'rgb(0, 200, 200)' },
            pink: { pairs: [[2, 13], [2, 10], [2, 12], [12, 10], [10, 13], [14, 3], [3, 15], [11, 15], [14, 11], [11, 3]], color: 'rgb(255, 50, 130)' },
            orange: { pairs: [[8, 9], [6, 7]], color: 'rgb(255, 120, 0)' },
            purple: { pairs: [
                [20, 21], [20, 22], [21, 13], [20, 10], [20, 11], [22, 14], [12, 7], [15, 9], 
                [12, 21], [12, 4], [15, 22], [15, 5], [0, 4], [0, 5], [21, 4], [22, 5], 
                [21, 0], [20, 4], [20, 5], [22, 0]
            ], color: 'rgb(120, 80, 255)' }
        };

        function toggleMode() {
            electrodeMode = !electrodeMode;
            if (electrodeMode) {
                toggleBtn.innerText = "חישוב אלקטרודות";
                toggleBtn.className = "mode-btn active-electrodes";
            } else {
                toggleBtn.innerText = "שלד אנטומי";
                toggleBtn.className = "mode-btn active-skeleton";
            }
        }

        worker.onmessage = function(e) {
            if (e.data.status === 'loaded') {
                statusDiv.innerText = "המערכת מוכנה לסריקה בזמן אמת";
                statusDiv.style.color = "#34c759"; 
            } else if (e.data.type === 'results') {
                // המרת הקואורדינטות מה-Worker למידות האמיתיות של המצלמה שלך
                targetKpts = e.data.kpts.map(pt => {
                    if (!pt) return null;
                    return {
                        x: (pt.x / 640) * canvas.width,
                        y: (pt.y / 480) * canvas.height
                    };
                });
                setTimeout(() => { isWorkerBusy = false; }, 20);
            } else if (e.data.type === 'error') {
                statusDiv.innerText = "שגיאה: " + e.data.message;
                statusDiv.style.color = "#ff3b30"; 
                console.error("Worker Error:", e.data.message);
                setTimeout(() => { isWorkerBusy = false; }, 1000); 
            }
        };

        async function setupCamera() {
            // מבקשים מהמצלמה את הרזולוציה הכי גבוהה ויפה שהיא יכולה לתת (HD)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
            });
            video.srcObject = stream;
            
            return new Promise(resolve => { 
                video.onloadedmetadata = () => {
                    // הגדרת הקנבס והתיבה למידות האמיתיות של המצלמה (מתקן את השטחים המתים ואת הפנים המעוכות)
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    container.style.aspectRatio = `${video.videoWidth} / ${video.videoHeight}`;
                    resolve(video); 
                };
            });
        }

        function sendFrameToWorker() {
            if (isWorkerBusy) return;
            tempCtx.drawImage(video, 0, 0, 416, 416);
            const imgData = tempCtx.getImageData(0, 0, 416, 416);
            isWorkerBusy = true;
            worker.postMessage({ type: 'frame', imgData: imgData }, [imgData.data.buffer]);
        }

        const norm = v => Math.sqrt(v.x * v.x + v.y * v.y);
        const dist = (p1, p2) => norm({x: p1.x - p2.x, y: p1.y - p2.y});
        const sub = (p1, p2) => ({x: p1.x - p2.x, y: p1.y - p2.y});
        const add = (p1, p2) => ({x: p1.x + p2.x, y: p1.y + p2.y});
        const mul = (v, s) => ({x: v.x * s, y: v.y * s});
        const dot = (v1, v2) => v1.x * v2.x + v1.y * v2.y;

        function computeVirtualPoints() {
            let k = smoothedKpts;
            if (k[0] && k[1]) k[20] = {x: (k[0].x + k[1].x)/2, y: (k[0].y + k[1].y)/2}; else k[20] = null;
            if (k[4] && k[10]) k[21] = {x: k[10].x, y: (k[4].y + k[10].y)/2}; else k[21] = null;
            if (k[5] && k[11]) k[22] = {x: k[11].x, y: (k[5].y + k[11].y)/2}; else k[22] = null;
        }

        function computeElectrodes() {
            let k = smoothedKpts;
            const valid = p => p !== null && p !== undefined;
            
            let p_JN = k[0], p_XP = k[1], p_IMF = k[2];

            const getLeftPhysical = (i, j) => {
                if (k[i] && k[j]) return k[i].x > k[j].x ? k[i] : k[j];
                return k[i] || k[j];
            };
            const getRightPhysical = (i, j) => {
                if (k[i] && k[j]) return k[i].x < k[j].x ? k[i] : k[j];
                return k[i] || k[j];
            };

            let p_MCP_Anchor = getLeftPhysical(4, 5);
            let p_MCP_Opposite = getRightPhysical(4, 5);
            let p_AAL = getLeftPhysical(6, 8); 
            let p_MAL = getLeftPhysical(7, 9); 

            if (!valid(p_JN) || !valid(p_XP) || !valid(p_MCP_Anchor)) return null;

            let vec_S = sub(p_XP, p_JN);
            let len_S = norm(vec_S);
            if (len_S < 1e-6) return null;

            let u_S = {x: vec_S.x / len_S, y: vec_S.y / len_S};
            
            let dir_vec = sub(p_MCP_Anchor, p_JN);
            let proj_y = dot(dir_vec, u_S);
            let chest_vec = sub(dir_vec, mul(u_S, proj_y)); 
            let chest_len = norm(chest_vec);
            if (chest_len < 1e-6) return null;

            let u_Chest = { x: chest_vec.x / chest_len, y: chest_vec.y / chest_len };
            let u_Opposite = { x: -u_Chest.x, y: -u_Chest.y };

            const localOut = p => dot(sub(p, p_JN), u_Chest);
            const localDown = p => dot(sub(p, p_JN), u_S);
            const glob = (outward, downward) => add(add(p_JN, mul(u_Chest, outward)), mul(u_S, downward));

            let p_c4 = add(p_JN, mul(vec_S, 0.72));
            let dist_R = valid(p_MCP_Opposite) ? norm(sub(p_JN, p_MCP_Opposite)) : norm(sub(p_JN, p_MCP_Anchor));
            let dist_L = norm(sub(p_JN, p_MCP_Anchor));
            let avg_d = (dist_R + dist_L) / 2;
            let offset = 0.35 * avg_d;

            let V2 = add(p_c4, mul(u_Chest, offset)); 
            let V1 = add(p_c4, mul(u_Opposite, offset)); 

            let mcp_out = localOut(p_MCP_Anchor); 
            let v4_y_theo = 0.85 * len_S + Math.abs(mcp_out) * 0.22;
            let v4_down = valid(p_IMF) ? localDown(p_IMF) : v4_y_theo;
            let V4 = glob(mcp_out, v4_down);

            let V3 = {x: (V2.x + V4.x)/2, y: (V2.y + V4.y)/2};

            let v5_out = valid(p_AAL) ? localOut(p_AAL) : mcp_out + avg_d * 0.3;
            let V5 = glob(v5_out, v4_down);

            let d_aal = valid(p_AAL) ? (v5_out - mcp_out) : avg_d * 0.3;
            let v6_out = valid(p_MAL) ? localOut(p_MAL) : mcp_out + d_aal * 1.6;
            let V6 = glob(v6_out, v4_down);

            return { V1, V2, V3, V4, V5, V6 };
        }

        function drawElectrodes(elec, scale) {
            const colors = {
                V1: 'rgb(255, 59, 48)',   V2: 'rgb(255, 204, 0)',   V3: 'rgb(90, 200, 250)',
                V4: 'rgb(52, 199, 89)',   V5: 'rgb(175, 82, 222)',  V6: 'rgb(0, 122, 255)'
            };
            const textDark = ["V2"]; 

            for (let [name, pos] of Object.entries(elec)) {
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 11 * scale, 0, 2 * Math.PI);
                ctx.fillStyle = colors[name];
                ctx.fill();
                ctx.lineWidth = 2.5 * scale;
                ctx.strokeStyle = 'white';
                ctx.stroke();

                ctx.save(); 
                ctx.translate(pos.x, pos.y);
                ctx.scale(-1, 1); 
                
                ctx.font = `bold ${11 * scale}px -apple-system, sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = textDark.includes(name) ? "#1d1d1f" : "white";
                ctx.fillText(name, 0, 1 * scale); 
                ctx.restore(); 
            }
        }

        function renderLoop() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // חישוב יחס גודל הציור כדי שיישאר באותו עובי גם כשעוברים ל-HD
            const scale = canvas.height / 480;

            for (let i = 0; i < 16; i++) {
                if (targetKpts[i]) {
                    if (!smoothedKpts[i]) smoothedKpts[i] = { x: targetKpts[i].x, y: targetKpts[i].y };
                    else {
                        smoothedKpts[i].x += smoothingFactor * (targetKpts[i].x - smoothedKpts[i].x);
                        smoothedKpts[i].y += smoothingFactor * (targetKpts[i].y - smoothedKpts[i].y);
                    }
                } else {
                    smoothedKpts[i] = null;
                }
            }

            computeVirtualPoints();

            if (electrodeMode) {
                let electrodes = computeElectrodes();
                if (electrodes) drawElectrodes(electrodes, scale);
            } else {
                Object.values(connections).forEach(group => {
                    ctx.strokeStyle = group.color;
                    ctx.lineWidth = 3.5 * scale;
                    ctx.lineCap = "round"; 
                    group.pairs.forEach(([p1, p2]) => {
                        if (p1 < 23 && p2 < 23 && smoothedKpts[p1] && smoothedKpts[p2]) {
                            ctx.beginPath();
                            ctx.moveTo(smoothedKpts[p1].x, smoothedKpts[p1].y);
                            ctx.lineTo(smoothedKpts[p2].x, smoothedKpts[p2].y);
                            ctx.stroke();
                        }
                    });
                });

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                smoothedKpts.forEach(pt => {
                    if (pt) {
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, 4.5 * scale, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                });
            }

            sendFrameToWorker();
            requestAnimationFrame(renderLoop);
        }

        async function main() {
            await setupCamera();
            video.play();
            renderLoop();
        }

        main();
    </script>
</body>
</html>
